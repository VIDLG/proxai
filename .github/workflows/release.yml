name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows exe
    runs-on: windows-latest
    env:
      RUSTUP_TOOLCHAIN: stable-x86_64-pc-windows-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust GNU
        shell: pwsh
        run: rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal --component clippy --component rustfmt

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.9.0
        with:
          pixi-version: latest
          cache: true

      - name: Check
        run: pixi run just check

      - name: Build release exe
        run: pixi run just build

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item target\release\zed-openai-shim.exe dist\zed-openai-shim.exe
          Copy-Item .env.example dist\.env.example
          Compress-Archive -Path dist\zed-openai-shim.exe,dist\.env.example -DestinationPath dist\zed-openai-shim-windows-x86_64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-openai-shim-windows-x86_64
          path: dist/zed-openai-shim-windows-x86_64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/zed-openai-shim-windows-x86_64.zip
