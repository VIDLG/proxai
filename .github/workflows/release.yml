name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  windows:
    name: Windows exe
    runs-on: windows-latest
    env:
      RUSTUP_TOOLCHAIN: stable-x86_64-pc-windows-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install Rust GNU
        run: rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal --component clippy --component rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-gnu
          cache-on-failure: true

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.9.0
        with:
          pixi-version: latest
          cache: true

      - name: Check
        run: pixi run just check

      - name: Build release exe
        run: pixi run just build

      - name: Stage artifact
        run: |
          rm -rf dist/package
          rm -f dist/zed-openai-shim-windows-x86_64.zip
          mkdir -p dist/package
          cp target/release/zed-openai-shim.exe dist/package/zed-openai-shim.exe
          cp .env.example dist/package/.env.example
          cd dist/package
          7z a ../zed-openai-shim-windows-x86_64.zip zed-openai-shim.exe .env.example

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RELEASE_NOTES_REQUIRE_AI: "true"
        run: |
          pixi run git-cliff --latest --output dist/release-notes.raw.md
          pixi run python scripts/polish_release_notes.py \
            --input dist/release-notes.raw.md \
            --output dist/release-notes.md

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: zed-openai-shim-windows-x86_64
          path: dist/zed-openai-shim-windows-x86_64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3.0.0
        with:
          body_path: dist/release-notes.md
          files: dist/zed-openai-shim-windows-x86_64.zip
