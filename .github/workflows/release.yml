name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  windows:
    name: Windows exe
    runs-on: windows-latest
    env:
      RUSTUP_TOOLCHAIN: stable-x86_64-pc-windows-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install Rust GNU
        run: rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal --component clippy --component rustfmt

      - name: Cache Rust build
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-rust-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', '.cargo/config.toml', 'pixi.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.9.0
        with:
          pixi-version: latest
          cache: true

      - name: Check
        run: pixi run just check

      - name: Build release exe
        run: pixi run just build

      - name: Stage artifact
        run: |
          rm -rf dist/package
          rm -f dist/zed-openai-shim-windows-x86_64.zip
          mkdir -p dist/package
          cp target/release/zed-openai-shim.exe dist/package/zed-openai-shim.exe
          cp .env.example dist/package/.env.example
          cd dist/package
          7z a ../zed-openai-shim-windows-x86_64.zip zed-openai-shim.exe .env.example

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          tag="${GITHUB_REF_NAME}"
          previous_tag="$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)"

          if [ -n "${previous_tag}" ]; then
            git log --pretty=format:'- %s (%h)' "${previous_tag}..${tag}" > dist/commits.md
          else
            git log --pretty=format:'- %s (%h)' "${tag}" > dist/commits.md
          fi

          pixi run python scripts/generate_release_notes.py \
            --tag "${tag}" \
            --previous-tag "${previous_tag}" \
            --commits dist/commits.md \
            --output dist/release-notes.md

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: zed-openai-shim-windows-x86_64
          path: dist/zed-openai-shim-windows-x86_64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3.0.0
        with:
          body_path: dist/release-notes.md
          files: dist/zed-openai-shim-windows-x86_64.zip
